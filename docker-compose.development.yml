services:
  postgres:
    env_file: .env.development
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - yara_dev_postgres_data:/var/lib/postgresql/data

  redis:
    env_file: .env.development
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - yara_dev_redis_data:/data

  api:
    env_file: .env.development
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    env_file: .env.development
    volumes:
      - ./backend:/app

volumes:
  yara_dev_postgres_data:
  yara_dev_redis_data:
