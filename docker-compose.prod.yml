services:
  postgres:
    env_file:
      - .env.production
    volumes:
      - yara_prod_postgres_data:/var/lib/postgresql/data

  redis:
    volumes:
      - yara_prod_redis_data:/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        INSTALL_DEV: "${INSTALL_DEV:?INSTALL_DEV is required}"
    image: "${YARA_IMAGE:?YARA_IMAGE is required}:${IMAGE_TAG:?IMAGE_TAG is required}"
    env_file:
      - .env.production
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        INSTALL_DEV: "${INSTALL_DEV:?INSTALL_DEV is required}"
    image: "${YARA_IMAGE:?YARA_IMAGE is required}:${IMAGE_TAG:?IMAGE_TAG is required}"
    env_file:
      - .env.production
    command: python -m app.scripts.start_worker

volumes:
  yara_prod_postgres_data:
  yara_prod_redis_data:
