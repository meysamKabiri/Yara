x-backend-env: &backend-env
  SERVICE_NAME: api
  DATABASE_URL: postgresql+psycopg://yara:yara_password@postgres:5432/yara_dev
  REDIS_URL: redis://redis:6379
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
  OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:4b}
  OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-60}
  OLLAMA_NUM_PREDICT: ${OLLAMA_NUM_PREDICT:-120}
  OLLAMA_TEMPERATURE: ${OLLAMA_TEMPERATURE:-0}
  PYTHONUNBUFFERED: "1"

x-worker-env: &worker-env
  SERVICE_NAME: worker
  DATABASE_URL: postgresql+psycopg://yara:yara_password@postgres:5432/yara_dev
  REDIS_URL: redis://redis:6379
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
  OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:4b}
  OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-60}
  OLLAMA_NUM_PREDICT: ${OLLAMA_NUM_PREDICT:-120}
  OLLAMA_TEMPERATURE: ${OLLAMA_TEMPERATURE:-0}
  PYTHONUNBUFFERED: "1"

x-backend-build: &backend-build
  context: ./backend
  dockerfile: Dockerfile

services:

  postgres:
    image: postgres:16-alpine
    container_name: yara_postgres
    environment:
      POSTGRES_DB: yara_dev
      POSTGRES_USER: yara
      POSTGRES_PASSWORD: yara_password
    ports:
      - "5433:5432"
    volumes:
      - yara_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: yara_redis
    ports:
      - "6380:6379"
    volumes:
      - yara_redis_data:/data
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: yara_ollama
    profiles:
      - docker-ollama
    ports:
      - "11434:11434"
    volumes:
      - yara_ollama_data:/root/.ollama
    restart: unless-stopped

  api:
    build: *backend-build
    container_name: yara_api
    ports:
      - "8000:8000"
    environment: *backend-env
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  worker:
    build: *backend-build
    container_name: yara_worker
    environment: *worker-env
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
    command: python -m app.scripts.start_worker
    restart: unless-stopped

volumes:
  yara_ollama_data:
  yara_postgres_data:
  yara_redis_data:
