services:
  postgres:
    env_file:
      - .env.development
    ports:
      - "5433:5432"
    volumes:
      - yara_dev_postgres_data:/var/lib/postgresql/data

  redis:
    env_file:
      - .env.development
    ports:
      - "6380:6379"
    volumes:
      - yara_dev_redis_data:/data

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - yara_dev_ollama_data:/root/.ollama
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        INSTALL_DEV: "true"
    image: yara-backend:development
    env_file:
      - .env.development
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        INSTALL_DEV: "true"
    image: yara-backend:development
    env_file:
      - .env.development
    volumes:
      - ./backend:/app
    command: python -m app.scripts.start_worker

volumes:
  yara_dev_postgres_data:
  yara_dev_redis_data:
  yara_dev_ollama_data:
